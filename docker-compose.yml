version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kh-cloud-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: khcloud
      POSTGRES_PASSWORD: khcloudpassword
      POSTGRES_DB: khclouddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kh-cloud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: kh-cloud-minio
    ports:
      - "9000:9000"       # API
      - "9001:9001"       # Console
    environment:
      MINIO_ROOT_USER: khcloudroot
      MINIO_ROOT_PASSWORD: khcloudrootpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
